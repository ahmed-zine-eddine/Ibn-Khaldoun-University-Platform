server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript
               image/svg+xml font/ttf font/otf;

    # Long-cache hashed CRA build assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry HTML (so deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — let React Router handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health probe target for Docker / load balancers
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
